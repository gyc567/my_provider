basePath: /
definitions:
  api.ErrorResponse:
    properties:
      detail:
        type: string
      error:
        type: string
      request_id:
        type: string
    type: object
  api.UpdatePayOutBand:
    properties:
      client_quote_id:
        type: string
      max_amount_usd:
        type: string
      rate:
        type: string
    type: object
  api.UpdatePayOutGroup:
    properties:
      bands:
        items:
          $ref: '#/definitions/api.UpdatePayOutBand'
        type: array
      currency:
        type: string
      expiration_seconds:
        type: integer
      payment_method:
        type: string
    type: object
  api.UpdatePayOutRequest:
    properties:
      groups:
        items:
          $ref: '#/definitions/api.UpdatePayOutGroup'
        type: array
    type: object
  api.UpdatePayOutResponse:
    properties:
      applied_at:
        description: RFC3339
        type: string
      bands_published:
        type: integer
      expires_at:
        description: RFC3339
        type: string
      groups_published:
        type: integer
      request_id:
        type: string
      status:
        description: always "OK"
        type: string
    type: object
  quoteapi.APIDecimal:
    properties:
      exponent:
        type: integer
      unscaled:
        type: integer
    type: object
  quoteapi.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  quoteapi.NetworkProviderQuote:
    properties:
      executable:
        type: boolean
      expiration:
        type: string
      payOutAmount:
        $ref: '#/definitions/quoteapi.APIDecimal'
      quoteId:
        $ref: '#/definitions/quoteapi.NetworkQuoteID'
      rate:
        $ref: '#/definitions/quoteapi.APIDecimal'
      settlement:
        $ref: '#/definitions/quoteapi.NetworkSettlement'
    type: object
  quoteapi.NetworkQuoteFailure:
    properties:
      reason:
        type: string
    type: object
  quoteapi.NetworkQuoteID:
    properties:
      providerId:
        type: integer
      quoteId:
        type: integer
    type: object
  quoteapi.NetworkQuoteResponse:
    properties:
      allQuotes:
        items:
          $ref: '#/definitions/quoteapi.NetworkProviderQuote'
        type: array
      result:
        $ref: '#/definitions/quoteapi.NetworkQuoteResult'
    type: object
  quoteapi.NetworkQuoteResult:
    properties:
      failure:
        $ref: '#/definitions/quoteapi.NetworkQuoteFailure'
      success:
        $ref: '#/definitions/quoteapi.NetworkQuoteSuccess'
    type: object
  quoteapi.NetworkQuoteSuccess:
    properties:
      expiration:
        type: string
      payOutAmount:
        $ref: '#/definitions/quoteapi.APIDecimal'
      quoteId:
        $ref: '#/definitions/quoteapi.NetworkQuoteID'
      rate:
        $ref: '#/definitions/quoteapi.APIDecimal'
      settlementAmount:
        $ref: '#/definitions/quoteapi.APIDecimal'
    type: object
  quoteapi.NetworkSettlement:
    properties:
      amount:
        $ref: '#/definitions/quoteapi.APIDecimal'
      creditLimit:
        $ref: '#/definitions/quoteapi.APIDecimal'
      prefundingAmount:
        $ref: '#/definitions/quoteapi.APIDecimal'
      totalUsed:
        $ref: '#/definitions/quoteapi.APIDecimal'
    type: object
  quoteapi.PublishResponse:
    properties:
      message:
        type: string
      published:
        type: boolean
    type: object
  quoteapi.SwaggerBand:
    properties:
      clientQuoteId:
        type: string
      fix:
        $ref: '#/definitions/quoteapi.APIDecimal'
      maxAmount:
        $ref: '#/definitions/quoteapi.APIDecimal'
      rate:
        $ref: '#/definitions/quoteapi.APIDecimal'
    type: object
  quoteapi.SwaggerGetNetworkQuoteRequest:
    properties:
      amount:
        $ref: '#/definitions/quoteapi.APIDecimal'
      amountType:
        type: string
      payOutCurrency:
        type: string
      payOutMethod:
        type: string
    type: object
  quoteapi.SwaggerQuoteGroup:
    properties:
      bands:
        items:
          $ref: '#/definitions/quoteapi.SwaggerBand'
        type: array
      currency:
        type: string
      expiration:
        type: string
      paymentMethod:
        type: string
      timestamp:
        type: string
    type: object
  quoteapi.SwaggerQuotesResponse:
    properties:
      payIn:
        items:
          $ref: '#/definitions/quoteapi.SwaggerQuoteGroup'
        type: array
      payOut:
        items:
          $ref: '#/definitions/quoteapi.SwaggerQuoteGroup'
        type: array
    type: object
  quoteapi.SwaggerUpdateQuotesRequest:
    properties:
      groups:
        items:
          $ref: '#/definitions/quoteapi.SwaggerQuoteGroup'
        type: array
    type: object
host: api.agtpay.xyz
info:
  contact: {}
  description: Quote management REST API for the t-0 Network provider.
  title: my-provider API
  version: "1.0"
paths:
  /api/v1/quotes:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/quoteapi.SwaggerQuotesResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get stored quote snapshots
      tags:
      - quotes
  /api/v1/quotes/network:
    post:
      consumes:
      - application/json
      parameters:
      - description: Network quote request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/quoteapi.SwaggerGetNetworkQuoteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/quoteapi.NetworkQuoteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a real-time network quote
      tags:
      - quotes
  /api/v1/quotes/pay-in:
    put:
      consumes:
      - application/json
      parameters:
      - description: Pay-in quote groups
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/quoteapi.SwaggerUpdateQuotesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/quoteapi.PublishResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update pay-in quotes
      tags:
      - quotes
  /api/v1/quotes/pay-out:
    post:
      consumes:
      - application/json
      parameters:
      - description: Optional idempotency key; if omitted, one is derived from the
          body hash
        in: header
        name: Idempotency-Key
        type: string
      - description: Pay-out quote groups
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdatePayOutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.UpdatePayOutResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "504":
          description: Gateway Timeout
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Push pay-out quotes to the network
      tags:
      - quotes
    put:
      consumes:
      - application/json
      parameters:
      - description: Pay-out quote groups
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/quoteapi.SwaggerUpdateQuotesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/quoteapi.PublishResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update pay-out quotes
      tags:
      - quotes
  /api/v1/quotes/publish:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/quoteapi.PublishResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Publish quotes to the network
      tags:
      - quotes
  /api/v1/quotes/publish/pay-in:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/quoteapi.PublishResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Publish quotes to the network
      tags:
      - quotes
  /api/v1/quotes/publish/pay-out:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/quoteapi.PublishResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/quoteapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Publish quotes to the network
      tags:
      - quotes
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
